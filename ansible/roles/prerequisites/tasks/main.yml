- name: Install required system packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - gpg
      - lsb-release
    state: present
    update_cache: yes

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker official GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Download Kubernetes repository signing key
  ansible.builtin.get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key
    dest: /tmp/kubernetes-release.key
    mode: '0644'

- name: Install Kubernetes repository signing key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /tmp/kubernetes-release.key
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /"
    state: present
    filename: kubernetes

- name: Install kube packages
  ansible.builtin.apt:
    name: "{{ k8s_packages }}"
    state: present
    update_cache: yes
    allow_downgrade: yes

- name: Hold kube packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ k8s_packages }}"

- name: Ensure kubelet is enabled and restarted after config change
  ansible.builtin.service:
    name: kubelet
    enabled: true
    state: restarted

- name: Disable swap
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb | int > 0
  changed_when: ansible_swaptotal_mb | int > 0

- name: Disable swap in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(.*\sswap\s+.*)$'
    replace: '# \\1'

- name: Load modules at start
  ansible.builtin.copy:
    src: files/modules.load.d/k8s.conf
    dest: /etc/modules-load.d/k8s.conf

- name: Modprobe modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Copy sysctl file
  ansible.builtin.copy:
    src: files/sysctl.d/k8s.conf
    dest: /etc/sysctl.d/k8s.conf
  notify: sysctl k8s

- name: Download containerd
  ansible.builtin.get_url:
    url: "https://github.com/containerd/containerd/releases/download/v{{ cri_containerd_version }}/containerd-{{ cri_containerd_version }}-linux-amd64.tar.gz"
    dest: "/tmp/containerd-{{ cri_containerd_version }}-linux-amd64.tar.gz"
    timeout: 500
  register: download_result
  until: download_result is succeeded
  retries: 8
  delay: 30

- name: Unpack containerd
  ansible.builtin.unarchive:
    src: "/tmp/containerd-{{ cri_containerd_version }}-linux-amd64.tar.gz"
    dest: /usr/local
    remote_src: yes

- name: Install systemd service for containerd
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/containerd/containerd/main/containerd.service
    dest: /etc/systemd/system/containerd.service
    timeout: 60
  notify: systemd containerd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Make containerd config directory
  ansible.builtin.file:
    state: directory
    path: /etc/containerd

- name: Configure containerd
  ansible.builtin.copy:
    src: files/containerd/config.toml
    dest: /etc/containerd/config.toml
  notify: restart containerd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: create cni dir
  file:
    path: /opt/cni/bin
    state: directory

- name: Download CNI plugins archive
  get_url:
    url: "https://github.com/containernetworking/plugins/releases/download/v{{ cri_cni_version }}/cni-plugins-linux-amd64-v{{ cri_cni_version }}.tgz"
    dest: "/tmp/cni-plugins-linux-amd64-v{{ cri_cni_version }}.tgz"
    timeout: 500
  register: download_result
  until: download_result is succeeded
  retries: 8
  delay: 30

- name: Unpack CNI plugins
  unarchive:
    src: "/tmp/cni-plugins-linux-amd64-v{{ cri_cni_version }}.tgz"
    dest: /opt/cni/bin
    remote_src: yes
  
- name: Install runc
  ansible.builtin.get_url:
    url: "https://github.com/opencontainers/runc/releases/download/v{{ cri_runc_version }}/runc.amd64"
    dest: /usr/local/bin/runc
    mode: '0755'
    timeout: 500
  register: download_result
  until: download_result is succeeded
  retries: 8
  delay: 30
